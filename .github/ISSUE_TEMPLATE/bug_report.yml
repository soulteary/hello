name: Bug report
description: Report something that is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much
        detail as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `hello cat`, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `docker run --rm soulteary/hello ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `hello -version` (or the image tag you used).
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, terminal emulator, and how you ran it (Docker, go install, binary).
    validations:
      required: true
